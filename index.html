<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotline</title>

    <!-- css link   -->
     <link rel="stylesheet" href="style.css">

    <!-- font awesome cdn  -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- tailwind css cdn -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="hind-maduri">
    <nav class="px-[60px] py-6 flex justify-between items-center">
        <div class="flex gap-2 items-center">
            <img src="./assets/logo.png" class="w-16" alt="">
            <h1 class="text-4xl font-bold">Emergency <br>
                Service</h1>
        </div>
        <div class="flex gap-2">
            <div class="bg-[#ECFFF0] flex gap-4 items-center px-6 py-3 rounded-4xl">
                <span>0</span>
                <img src="./assets/heart.png" class="w-8" alt="">
            </div>
            <div class="bg-[#ECFFF0] flex gap-4 items-center px-6 py-3 rounded-4xl">
                <span>100</span>
                <img src="./assets/coin.png" class="w-8" alt="">
            </div>
            <div class="bg-[#00A63E] text-white font-bold flex gap-2 items-center px-6 py-3 rounded-4xl">
                <span>2</span>
                <span>Copy</span>
            </div>
        </div>
    </nav>
    <section>
        <div>
            <img src="./assets/logo.png" alt="">
            <h1>Emergency Service Directory</h1>
            <p>Government Emergency Services at Your Fingertip - A Project by  Government of the People&apos;s Republic of Bangladesh</p>
        </div>
    </section>
    <section>
        <div>
            <div>
                <div>
                    <div><img src="./assets/police.png" alt=""></div>
                    <img src="./assets/heart.png" alt="">
                </div>
                <div>
                    <h2>National Emergency Number</h2>
                    <p>National Emergency</p>
                </div>
                <div>
                    <h1>999</h1>
                    <p>All</p>
                </div>
                <div>
                    <button>Copy</button>
                    <button>Call</button>
                </div>
            </div>
            <div>
                <div>
                    <div>
                        <p>Call History</p>
                    </div>
                    <button>Clear</button>
                </div>
            </div>
        </div>
    </section>
</body>
</html>
